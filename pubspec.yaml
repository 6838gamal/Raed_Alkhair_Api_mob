name: raedalkhair
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Localization (official)
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Networking (اختياري لكن مهم لأي مشروع حقيقي)
  dio: ^5.4.0

  # Routing (احترافي)
  go_router: ^14.0.0

  # Local Storage (خفيف وسريع)
  shared_preferences: ^2.2.2

  # Icons
  cupertino_icons: ^1.0.8
  shelf: ^1.4.1
  shelf_static: ^1.1.3
  shelf_proxy: ^1.0.5
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # fonts:
